<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Mask Pro Studio</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Magic Mask Pro Studio</h1>
      <button id="installSam2Btn" class="secondary">One-Click SAM2 Setup</button>
      <span id="status" class="status">Ready</span>
    </header>

    <main class="editor">
      <aside class="panel media-bin">
        <h2>Media Bin</h2>
        <input id="projectName" value="Untitled Project" />
        <button id="createProjectBtn">Create Project</button>
        <input id="videoUpload" type="file" accept="video/*" />
        <button id="addClipBtn">Add Clip to Timeline</button>
        <div id="clipInfo"></div>
      </aside>

      <section class="panel preview-pane">
        <h2>Live Preview</h2>
        <div class="preview-stack">
          <video id="previewVideo" controls></video>
          <canvas id="overlayCanvas"></canvas>
        </div>
        <div class="toolbar">
          <label>Trim In <input id="trimStart" type="number" value="0" min="0" step="0.1" /></label>
          <label>Trim Out <input id="trimEnd" type="number" value="0" min="0" step="0.1" /></label>
          <label><input id="disableTrim" type="checkbox" checked /> No Trim</label>
        </div>
      </section>

      <aside class="panel mask-pane">
        <h2>Mask Tool</h2>
        <p>Click the preview to add positive points, hold <strong>Shift</strong> + click to erase.</p>
        <div class="toolbar">
          <label>Dilation <input id="dilationPx" type="range" min="0" max="32" value="6" /></label>
          <label>Feather <input id="featherPx" type="range" min="0" max="16" value="4" /></label>
        </div>
        <div class="btns">
          <button id="previewMaskBtn">Live Mask Preview</button>
          <button id="clearMaskBtn" class="secondary">Clear Points</button>
        </div>

        <h3>Export Background</h3>
        <div id="backgroundGrid" class="background-grid"></div>
        <input id="backgroundUpload" type="file" accept="image/*" />
        <button id="exportBtn">Export Composite</button>
        <div class="progress"><div id="progressBar"></div></div>
      </aside>
    </main>

    <section class="panel timeline">
      <h2>Timeline</h2>
      <p>Drag clips to reorder like an editor track.</p>
      <div id="timelineTrack" class="timeline-track"></div>
    </section>

    <section class="panel">
      <h2>Exports</h2>
      <div id="library" class="library"></div>
    </section>

    <script src="/web/app.js" type="module"></script>
  </body>
</html>
